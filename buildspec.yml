version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto8
  pre_build:
    commands:
      - echo Nothing to do in the pre_build phase...
  build:
    commands:
      - echo Build started on `date`
      - java -version
      - mvn clean install -P$TRACKING_ENV
  post_build:
    commands:
      - echo Build completed on `date`
artifacts:
  files:
    - web/target/tracking-rest-app.war
    - 'resources/scripts/*'
    - appspec.yml
